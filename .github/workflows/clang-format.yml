name: Clang Format

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  clang-format:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format
    
    - name: Check formatting
      run: |
        find . -name "*.cpp" -o -name "*.h" | xargs clang-format -style=gnu -i
        git diff --exit-code || (echo "Please run clang-format to fix formatting issues" && exit 1)
